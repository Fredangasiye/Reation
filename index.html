    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F3EFE6;
            color: #2C2C2C;
            overflow-x: hidden;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        .slide-up {
            animation: slideUp 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .quick-fade {
            animation: quickFade 0.2s ease-out forwards;
        }

        @keyframes quickFade {
            from {
                opacity: 0.8;
            }

            to {
                opacity: 1;
            }
        }

        .progress-bar {
            transition: width 0.3s ease-in-out;
        }

        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .option-card:hover {
            transform: scale(1.01);
            border-color: #6B7D6D;
            background: white;
            box-shadow: 0 10px 15px -3px rgba(31, 42, 56, 0.1);
        }

        .option-card.selected {
            background-color: #F3EFE6;
            border-color: #1F2A38;
            transform: scale(0.98);
        }

        .option-card:active {
            transform: scale(0.98);
        }

        .loader {
            border-top-color: #1F2A38;
            animation: spinner 0.8s linear infinite;
        }

        @keyframes spinner {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .vibrant-gradient {
            background: linear-gradient(135deg, #1F2A38 0%, #6B7D6D 100%);
        }

        .glass {
            background: #FFFFFF;
            border: 1px solid #1F2A38;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .blur-content {
            filter: blur(8px);
            pointer-events: none;
            user-select: none;
        }

        .no-scroll {
            overflow: hidden !important;
            height: 100% !important;
        }

        .overlay-container {
            position: absolute;
            inset: 0;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #F3EFE6;
            backdrop-filter: blur(12px);
            padding: 2rem;
            text-align: center;
        }

        .pdf-capture {
            background-color: #F3EFE6 !important;
            color: #2C2C2C !important;
            width: 800px !important;
            margin: 0 auto !important;
            padding: 40px !important;
        }

        .pdf-capture * {
            color: #2C2C2C !important;
        }

        .pdf-capture .bg-rose-50,
        .pdf-capture .bg-white {
            background-color: transparent !important;
            border-color: #1F2A38 !important;
        }

        .pdf-capture [class*='bg-[#1e1b4b]'],
        .pdf-capture [class*='bg-[#1F2A38]'] {
            background-color: #1F2A38 !important;
            color: white !important;
        }

        .pdf-capture [class*='bg-[#1e1b4b]'] * {
            color: white !important;
        }
    </style>

        function getBracket(d, score) {
            const content = SCAN_CONTENT[d];
            if (!content) return null;
            if (score <= 3) return content.brackets.stable;

            if (score <= 8) return content.brackets.watch;
            return content.brackets.risk;

        function calculateScores(answersArr) {
            const target = (answersArr || state.answers).map(a => SCORING_MAP[a] || 3);
            const res = {};

            const partnerData = (state.isPartner2 || state.p1Answers) ? (state.p1Answers || state.answers).map(a => SCORING_MAP[a] || 3) : null;
            const userData = target;

            for (let d = 1; d <= 6; d++) {
                const domainQuestions = QUESTIONS.filter(q => q.domain === d);
                const domainSize = domainQuestions.length;
                const axisAnswers = [];

                domainQuestions.forEach(q => {
                    const idx = QUESTIONS.findIndex(item => item.id === q.id);
                    if (idx !== -1) {
                        axisAnswers.push({
                            user: userData[idx],
                            partner: partnerData ? partnerData[idx] : userData[idx]
                        });
                    }
                });

                let axisScore = 0;
                if (partnerData) {
                    const rawDiff = axisAnswers.reduce((sum, item) => sum + Math.abs(item.user - item.partner), 0);
                    // Max diff per question is 4 (1 vs 5). 
                    // Normalizing to 10 scale: (rawDiff / (size * 4)) * 10
                    axisScore = (rawDiff / (domainSize * 4)) * 10;
                } else {
                    // For single user, we can't show "friction" without a partner.
                    // We'll show a baseline of 0 (no friction) or just skip details.
                    axisScore = 0;
                }

                const bracket = getBracket(d, axisScore);

                res[d] = {
                    score: axisScore,
                    status: bracket ? bracket.status : "UNKNOWN",
                    data: bracket
                };
            }
            return res;
        }

        function renderSingleResults() {

                const pillarAns = state.singleAnswers.filter(a => a.pillar === p);
                const sum = pillarAns.reduce((s, a) => s + a.score, 0);
                pillarScores[p] = {
                    sum: sum,
                    percentage: Math.round((sum / 30) * 100)
                };
            });

            const totalScore = Object.values(pillarScores).reduce((s, p) => s + p.sum, 0);
            const totalPercentage = Math.round((totalScore / 150) * 100);

            // Determine Archetype (Find lowest pillar)
            let lowestPillar = pillars[0];
            pillars.forEach(p => {
                if (pillarScores[p].percentage < pillarScores[lowestPillar].percentage) {
                    lowestPillar = p;
                }

            // Trigger mapping for special conditions
            let archetypeKey = lowestPillar;
            if (pillarScores[lowestPillar].percentage > 60) {
                archetypeKey = "STABLE";

                if (p <= 75) return { label: "Stable but Developing", color: "text-yellow-500" };
                if (p <= 90) return { label: "Strong Foundation", color: "text-emerald-500" };
                return { label: "Mature & Intentional", color: "text-blue-500" };

                    </div>

                    <!-- Diagnosis Section -->
                    <div class="space-y-4 px-2">
                        <h4 class="text-sm font-black uppercase tracking-widest text-[#1F2A38]">The Assessment</h4>
                        <p class="text-2xl text-[#2C2C2C]/80 leading-snug font-medium italic">"${arcData.diagnosis}"</p>
                    </div>

                    <!-- Key Insights Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- Things you do -->
                        <div class="bg-white p-8 rounded-[2.5rem] border border-[#1F2A38]/10 shadow-sm space-y-6">
                            <h5 class="text-xs font-black uppercase tracking-widest text-emerald-700 flex items-center">
                                <span class="w-2 h-2 rounded-full bg-emerald-700 mr-2"></span>
                                Things you do
                            </h5>
                            <ul class="space-y-4">
                                ${arcData.pattern.map(p => `
                                    <li class="text-lg text-[#2C2C2C] flex items-start leading-tight">
                                        <span class="text-emerald-700 mr-3 mt-1.5 shrink-0">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                        </span>
                                        ${p}
                                    </li>`).join('')}
                            </ul>
                        </div>

                        <div class="space-y-8">
                            <!-- The vibe you give off -->
                            <div class="bg-[#F3EFE6] p-8 rounded-[2.5rem] border border-[#1F2A38]/10 shadow-sm space-y-4">
                                <h5 class="text-xs font-black uppercase tracking-widest text-[#1F2A38] flex items-center">
                                    <span class="w-2 h-2 rounded-full bg-[#1F2A38] mr-2"></span>
                                    The vibe you give off
                                </h5>
                                <p class="text-xl text-[#2C2C2C]/80 italic font-medium leading-relaxed">"${arcData.signal}"</p>
                            </div>

                            <!-- Where things go wrong -->
                            <div class="bg-rose-50 p-8 rounded-[2.5rem] border border-rose-200 shadow-sm space-y-4">
                                <h5 class="text-xs font-black uppercase tracking-widest text-rose-700 flex items-center">
                                    <span class="w-2 h-2 rounded-full bg-rose-600 mr-2"></span>
                                    Where things usually go wrong
                                </h5>
                                <p class="text-lg text-[#2C2C2C] leading-relaxed font-medium">${arcData.failure}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Readiness Section -->
                    <div class="bg-[#1F2A38] p-10 rounded-[3rem] text-center space-y-4 shadow-xl">
                        <h4 class="text-xs font-black uppercase tracking-widest text-[#6B7D6D]">Relationship Readiness</h4>
                        <p class="text-3xl text-white font-black">${arcData.readiness}</p>
                    </div>
                    <!-- Heads Up / Risk Section -->
                    <div class="bg-white p-8 rounded-[2.5rem] border border-[#1F2A38]/20 shadow-[inset_0_2px_4px_rgba(31,42,56,0.05)] space-y-3">
                        <h4 class="text-xs font-black uppercase tracking-widest text-[#1F2A38]">Heads up</h4>
                        <p class="text-lg text-[#2C2C2C] italic font-medium">"${totalPercentage < 50 ? 'High Risk of Repeating Past Relationship Cycles.' : (pillarScores[lowestPillar].percentage < 45 ? 'Critical pillar weakness detected below baseline.' : 'You\'re doing okay, but there\'s room to level up.')}"</p>
                    </div>

                    <!-- Detailed Breakdown -->
                    <div class="bg-white p-10 rounded-[3rem] border border-[#1F2A38]/20 shadow-sm space-y-10">
                        <h4 class="text-sm font-black uppercase tracking-widest text-[#1F2A38] text-center">Your dating breakdown</h4>
                        <div class="grid grid-cols-1 gap-8">
                            ${Object.entries(pillarScores).map(([p, data]) => {
                const band = data.percentage <= 40 ? 'needs work' : (data.percentage <= 60 ? 'growing' : (data.percentage <= 75 ? 'solid' : (data.percentage <= 90 ? 'strong' : 'boss level')));
                const color = data.percentage <= 60 ? 'bg-rose-400' : (data.percentage <= 75 ? 'bg-[#6B7D6D]' : 'bg-[#1F2A38]');
                const pillarNames = state.gender === 'male' ? {
                    M1: "Identity & Vision",
                    M2: "Attraction & Confidence",
                    M3: "Emotional Control",
                    M4: "Leading & Boundaries",
                    M5: "Stability & Character"
                } : {
                    F1: "Self-Worth",
                    F2: "Warmth & Openness",
                    F3: "Emotional Balance",
                    F4: "Filtering & Wisdom",
                    F5: "Long-term Intentions"
                };
                return `
                                    <div class="space-y-3">
                                        <div class="flex justify-between items-end">
                                            <div class="flex flex-col">
                                                <span class="text-xs font-black text-[#1F2A38] uppercase tracking-widest">${pillarNames[p]}</span>
                                                <span class="text-[10px] font-bold text-[#6B7D6D] uppercase tracking-widest">${band}</span>
                                            </div>
                                            <span class="text-sm font-black text-[#1F2A38]">${data.percentage}%</span>
                                        </div>
                                        <div class="w-full h-2 bg-[#F3EFE6] rounded-full overflow-hidden">
                                            <div class="h-full ${color} transition-all duration-1000" style="width: ${data.percentage}%"></div>
                                        </div>
                                    </div>
                                `;
            }).join('')}
                        </div>
                    </div>

                    <!-- Action Plan -->
                    <div class="bg-[#F3EFE6]/50 p-10 rounded-[3rem] border border-[#1F2A38]/20 space-y-10">
                        <div class="space-y-8">
                            <h4 class="text-sm font-black uppercase tracking-widest text-[#1F2A38]">Your next 30 days</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-12 gap-y-8">
                                ${arcData.action.map((a, i) => `
                                    <div class="text-lg text-[#2C2C2C] flex items-start leading-tight">
                                        <span class="w-8 h-8 rounded-full bg-[#1F2A38] text-white flex items-center justify-center text-[11px] font-black mr-4 flex-shrink-0 shadow-sm">${i + 1}</span>
                                        <span class="pt-1">${a}</span>
                                    </div>`).join('')}
                            </div>
                        </div>
                        <div class="pt-10 border-t border-[#1F2A38]/10 space-y-6">
                            <h4 class="text-xs font-black uppercase tracking-widest text-[#6B7D6D]">Long-term growth path</h4>
                            <div class="p-8 rounded-[2.5rem] bg-white border border-[#1F2A38]/10 shadow-sm">
                                <p class="text-xl text-[#2C2C2C] leading-relaxed font-medium">${arcData.growthPath}</p>
                            </div>
                        </div>
                    </div>

                    <!-- Simulator CTA -->
                    <div class="bg-[#1F2A38] p-10 rounded-[3rem] text-center space-y-8 shadow-xl">
                        <div class="space-y-4 flex flex-col items-center">
                            <svg class="w-8 h-8 text-[#6B7D6D]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="14" r="7" />
                                <path d="M12 7l-2-3h4l-2 3z" />
                                <path d="M10 4l2-2 2 2" />
                            </svg>
                            <div class="space-y-2">
                                <h4 class="text-xs font-black uppercase tracking-widest text-[#6B7D6D]">RINGREADY Simulator</h4>
                                <p class="text-[#F3EFE6]/80 text-lg font-light leading-relaxed">Test your reactions in real-world scenarios based on your weakest pillar: <span class="text-white font-bold underline decoration-[#6B7D6D] underline-offset-4">${state.gender === 'male' ? { M1: "Direction", M2: "Assertiveness", M3: "Emotional Stability", M4: "Leadership", M5: "Vetting" }[lowestPillar] : { F1: "Self-Worth", F2: "Receptivity", F3: "Emotional Regulation", F4: "Vetting", F5: "Long-Term" }[lowestPillar]}</span></p>
                            </div>
                        </div>
                        <button onclick="startSimulator('${lowestPillar}')" class="w-full py-6 bg-[#6B7D6D] hover:bg-[#5a6a5c] text-white rounded-[2rem] font-black uppercase tracking-widest text-sm transition-all shadow-xl shadow-black/20">Try Training Simulation</button>
                    </div>

                    <div class="text-center px-8 pt-8 opacity-40">
                        <p class="text-[#1F2A38] text-[10px] font-black uppercase tracking-[0.2em] leading-relaxed">
                            Patience over rushing • Character over chemistry • Mutual alignment
                        </p>
                    </div>
                </div>
            `;
        }

        function generatePartnerLink() {
            const payload = btoa(JSON.stringify({ name: state.name, answers: state.answers }));
            const url = new URL(window.location.href);
            url.searchParams.set('p1', payload);
            navigator.clipboard.writeText(url.toString());
            alert("Secret link copied! Send this to your partner.");
        }

        function checkParams() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('p1')) {
                try {
                    const data = JSON.parse(atob(params.get('p1')));
                    state.p1Name = data.name || "Partner 1";
                    state.p1Answers = data.answers || [];
                    state.isPartner2 = true;
                } catch (e) { }
            }
        }

        async function syncToWebhook(isManual = false) {
            const overlayEmail = document.getElementById('email-capture-overlay')?.value;
            const mainEmail = document.getElementById('email-capture')?.value;
            const email = overlayEmail || mainEmail || "";

            const btn = document.getElementById('send-report-btn');
            const syncText = document.getElementById('sync-text');

            const payload = {
                timestamp: new Date().toISOString(),
                mode: state.mode,
                name: state.name,
                gender: state.gender,
                partner_name: state.isPartner2 ? state.p1Name : null,
                status: state.relationshipStatus,
                user_type: state.isPartner2 ? "P2" : "P1",
                answers: state.mode === 'single' ? state.singleAnswers : state.answers,
                email: email
            };

            if (isManual) {
                btn.disabled = true;
                btn.textContent = "SENDING...";
                syncText.textContent = "COMMUNICATING WITH ENGINE...";
            }

            if (WEBHOOK_URL === "INSERT_YOUR_URL_HERE") {
                if (isManual) {
                    alert("EMAIL SETUP REQUIRED: Please provide a valid WEBHOOK_URL in the script section (around line 680) to enable report delivery. \n\nYou can use Google Apps Script or Formspree to receive these results as emails.");
                    btn.disabled = false;
                    btn.textContent = "DELIVER REPORT TO INBOX";
                    syncText.textContent = "SETUP REQUIRED IN CODE";
                }
                return;
            }

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    mode: 'cors', // Changed from no-cors for better error handling
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok || response.type === 'opaque') {
                    if (isManual) {
                        btn.textContent = "REPORT SENT";
                        btn.classList.remove('bg-[#1F2A38]');
                        btn.classList.add('bg-green-600');
                        syncText.textContent = "RELATIONAL DATA ENCRYPTED & SYNCED";
                    }
                } else {
                    throw new Error("Server error");
                }
            } catch (e) {
                if (isManual) {
                    btn.disabled = false;
                    btn.textContent = "SYNC FAILED - RETRY";
                    syncText.textContent = "SYNC ERROR - CHECK CONNECTION";
                    console.error("Sync Error:", e);
                }
            }
        }

        async function downloadPDF() {
            const element = document.getElementById('view-content');
            const opt = {
                margin: 0.5,
                filename: `RINGREADY_Report_${state.name || 'User'}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, backgroundColor: '#fff9f9' },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            // Add a temporary class to ensure dark background is captured correctly
            element.classList.add('pdf-capture');

            try {
                await html2pdf().set(opt).from(element).save();
            } catch (error) {
                console.error('PDF generation dimmed:', error);
                alert('Could not generate PDF. Please try again.');
            } finally {
                element.classList.remove('pdf-capture');
            }
        }

        function getLabel(t) { return { A: "Dominant", B: "Avoidant", C: "Secure", D: "Passive" }[t] || "Unknown"; }

        checkParams();
        render();
    </script>
</body>

</html>
